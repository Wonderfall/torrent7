name: TorrentApp

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/torrent-app.yml"
      - "Package.swift"
      - "Packaging/**"
      - "Scripts/build-app.zsh"
      - "Scripts/build-deps.zsh"
      - "Scripts/keys/**"
      - "Scripts/test-swift.zsh"
      - "Scripts/verify-app.zsh"
      - "Sources/TorrentApp/**"
      - "Sources/TorrentBridge/**"
      - "Tests/TorrentAppTests/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/torrent-app.yml"
      - "Package.swift"
      - "Packaging/**"
      - "Scripts/build-app.zsh"
      - "Scripts/build-deps.zsh"
      - "Scripts/keys/**"
      - "Scripts/test-swift.zsh"
      - "Scripts/verify-app.zsh"
      - "Sources/TorrentApp/**"
      - "Sources/TorrentBridge/**"
      - "Tests/TorrentAppTests/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: torrent-app-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Test, build, and verify
    runs-on: macos-26
    permissions: {}
    steps:
      - name: Check out repository
        shell: zsh {0}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="$GITHUB_REF"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$checkout_ref"
          git checkout --detach FETCH_HEAD

      - name: Install build tools
        shell: zsh {0}
        run: |
          set -euo pipefail
          brew install cmake ninja gnupg

      - name: Restore dependency cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/deps/source-cache
            .build/deps/arm64e
          key: deps-arm64e-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Scripts/build-deps.zsh', 'Scripts/keys/**') }}
          restore-keys: |
            deps-arm64e-${{ runner.os }}-${{ runner.arch }}-

      - name: Build pinned dependencies
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/build-deps.zsh

      - name: Run Swift tests
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/test-swift.zsh

      - name: Build app
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/build-app.zsh

      - name: Verify app bundle
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/verify-app.zsh
