name: TorrentBridge Fuzzing

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/torrent-bridge-fuzzing.yml"
      - "Package.swift"
      - "Scripts/build-deps.zsh"
      - "Scripts/libtorrent-patch-series.sh"
      - "Scripts/verify-xcode.zsh"
      - "Scripts/keys/**"
      - "Scripts/patches/**"
      - "Sources/TorrentBridge/**"
      - "Tools/BridgeFuzzing/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/torrent-bridge-fuzzing.yml"
      - "Package.swift"
      - "Scripts/build-deps.zsh"
      - "Scripts/libtorrent-patch-series.sh"
      - "Scripts/verify-xcode.zsh"
      - "Scripts/keys/**"
      - "Scripts/patches/**"
      - "Sources/TorrentBridge/**"
      - "Tools/BridgeFuzzing/**"
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions: {}

env:
  BASE_BRANCH: ${{ github.event.repository.default_branch }}
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
  XCODE_CACHE_KEY: xcode-26.6-17F113

concurrency:
  group: torrent-bridge-fuzzing-${{ github.event_name == 'schedule' && 'schedule' || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  fuzz:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Fuzz
    runs-on: macos-26
    permissions: {}
    timeout-minutes: 120
    steps:
      - name: Check out repository
        shell: zsh {0}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          elif [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            checkout_ref="refs/heads/${BASE_BRANCH}"
          else
            checkout_ref="$GITHUB_REF"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$checkout_ref"
          git checkout --detach FETCH_HEAD

      - name: Verify Xcode toolchain
        shell: zsh {0}
        run: Scripts/verify-xcode.zsh

      - name: Install fuzzing tools
        shell: zsh {0}
        run: |
          set -euo pipefail
          brew install cmake ninja gnupg llvm

      - name: Restore app dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/deps/source-cache
            .build/deps/arm64e
          key: deps-arm64e-${{ env.XCODE_CACHE_KEY }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Scripts/build-deps.zsh', 'Scripts/libtorrent-patch-series.sh', 'Scripts/verify-xcode.zsh', 'Scripts/keys/**', 'Scripts/patches/**') }}
      - name: Build pinned app dependencies
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/build-deps.zsh

      - name: Restore fuzzing dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: Tools/BridgeFuzzing/deps/arm64-libfuzzer
          key: libfuzzer-deps-arm64-${{ env.XCODE_CACHE_KEY }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/BridgeFuzzing/build-libfuzzer-deps.sh', 'Tools/BridgeFuzzing/build-libfuzzer.sh', 'Scripts/build-deps.zsh', 'Scripts/libtorrent-patch-series.sh', 'Scripts/verify-xcode.zsh', 'Scripts/patches/**') }}
      - name: Run bridge fuzzing
        shell: zsh {0}
        env:
          DEEP_RUNS: "25000"
          LIGHT_RUNS: "1000"
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" || "$GITHUB_EVENT_NAME" == "push" ]]; then
            export RUNS="$LIGHT_RUNS"
            export LIBFUZZER_ARGS="-timeout=10 -max_total_time=120"
          else
            export RUNS="$DEEP_RUNS"
            export LIBFUZZER_ARGS="-timeout=10"
          fi
          Tools/BridgeFuzzing/run-libfuzzer.sh

      - name: Upload fuzz failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-fuzz-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            Tools/BridgeFuzzing/libfuzzer-artifacts/**/crash-*
            Tools/BridgeFuzzing/libfuzzer-artifacts/**/timeout-*
            Tools/BridgeFuzzing/libfuzzer-artifacts/**/oom-*
            Tools/BridgeFuzzing/libfuzzer-artifacts/**/leak-*
          if-no-files-found: ignore
          retention-days: 14
