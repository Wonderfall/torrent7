name: Sanitizers

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sanitizers.yml"
      - "Documentation/EnhancedSecurityExtensionIntegration.md"
      - "Package.swift"
      - "Packaging/**"
      - "Scripts/**"
      - "Sources/**"
      - "Tests/**"
      - "ThirdParty/doctest/**"
      - "Tools/XPCIntegrationHost/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/sanitizers.yml"
      - "Documentation/EnhancedSecurityExtensionIntegration.md"
      - "Package.swift"
      - "Packaging/**"
      - "Scripts/**"
      - "Sources/**"
      - "Tests/**"
      - "ThirdParty/doctest/**"
      - "Tools/XPCIntegrationHost/**"
  workflow_dispatch:

permissions: {}

env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
  XCODE_CACHE_KEY: xcode-26.6-17F113

concurrency:
  group: sanitizers-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: ${{ matrix.name }}
    runs-on: macos-26
    permissions: {}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: address
            name: AddressSanitizer
            runtime_symbol: ___asan_
          - profile: thread
            name: ThreadSanitizer
            runtime_symbol: ___tsan_
    env:
      SANITIZER_PROFILE: ${{ matrix.profile }}
      ASAN_OPTIONS: halt_on_error=1:abort_on_error=1
      TSAN_OPTIONS: halt_on_error=1:exitcode=66:print_full_thread_history=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Check out repository
        shell: zsh {0}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="$GITHUB_REF"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$checkout_ref"
          git checkout --detach FETCH_HEAD

      - name: Verify Xcode toolchain
        shell: zsh {0}
        run: Scripts/verify-xcode.zsh

      - name: Install build tools
        shell: zsh {0}
        run: |
          set -euo pipefail
          brew install cmake ninja gnupg

      - name: Restore sanitizer dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/deps/source-cache
            .build/deps/arm64e-${{ matrix.profile }}
          key: deps-arm64e-${{ matrix.profile }}-${{ env.XCODE_CACHE_KEY }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Scripts/build-deps.zsh', 'Scripts/libtorrent-patch-series.sh', 'Scripts/verify-xcode.zsh', 'Scripts/keys/**', 'Scripts/patches/**') }}

      - name: Build fully instrumented dependencies
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/build-deps.zsh

      - name: Verify dependency instrumentation
        shell: zsh {0}
        env:
          RUNTIME_SYMBOL: ${{ matrix.runtime_symbol }}
        run: |
          set -euo pipefail
          for archive in \
            ".build/deps/arm64e-${SANITIZER_PROFILE}/prefix/lib/libcrypto.a" \
            ".build/deps/arm64e-${SANITIZER_PROFILE}/prefix/lib/libssl.a" \
            ".build/deps/arm64e-${SANITIZER_PROFILE}/prefix/lib/libtorrent-rasterbar.a"; do
            xcrun nm "$archive" \
              | awk -v symbol="$RUNTIME_SYMBOL" 'index($0, symbol) { found=1 } END { exit !found }' \
              || { print -ru2 -- "Missing $SANITIZER_PROFILE sanitizer instrumentation: $archive"; exit 1; }
          done

      - name: Run libtorrent security regressions
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-libtorrent-security.zsh

      - name: Run Bridge tests
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-bridge.zsh

      - name: Run Swift tests
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-swift.zsh

      - name: Build and verify sanitizer app
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/build-app.zsh

      - name: Exercise Enhanced Security lifecycle under sanitizer
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-enhanced-security-extension.zsh --automated
