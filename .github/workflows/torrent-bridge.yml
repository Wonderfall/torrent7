name: TorrentBridge

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/torrent-bridge.yml"
      - "Package.swift"
      - "Scripts/analyze-bridge.zsh"
      - "Scripts/build-deps.zsh"
      - "Scripts/libtorrent-patch-series.sh"
      - "Scripts/keys/**"
      - "Scripts/patches/**"
      - "Scripts/test-bridge.zsh"
      - "Scripts/test-libtorrent-security.zsh"
      - "Sources/TorrentBridge/**"
      - "Tests/TorrentBridgeTests/**"
      - "ThirdParty/doctest/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/torrent-bridge.yml"
      - "Package.swift"
      - "Scripts/analyze-bridge.zsh"
      - "Scripts/build-deps.zsh"
      - "Scripts/libtorrent-patch-series.sh"
      - "Scripts/keys/**"
      - "Scripts/patches/**"
      - "Scripts/test-bridge.zsh"
      - "Scripts/test-libtorrent-security.zsh"
      - "Sources/TorrentBridge/**"
      - "Tests/TorrentBridgeTests/**"
      - "ThirdParty/doctest/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: torrent-bridge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Analyze and test
    runs-on: macos-26
    permissions: {}
    timeout-minutes: 45
    steps:
      - name: Check out repository
        shell: zsh {0}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="$GITHUB_REF"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$checkout_ref"
          git checkout --detach FETCH_HEAD

      - name: Install build and analysis tools
        shell: zsh {0}
        run: |
          set -euo pipefail
          brew install cmake ninja gnupg llvm

      - name: Restore dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/deps/source-cache
            .build/deps/arm64e
          key: deps-arm64e-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Scripts/build-deps.zsh', 'Scripts/libtorrent-patch-series.sh', 'Scripts/keys/**', 'Scripts/patches/**') }}
      - name: Build pinned dependencies
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/build-deps.zsh

      - name: Run libtorrent security regressions
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-libtorrent-security.zsh

      - name: Analyze bridge
        shell: zsh {0}
        run: |
          set -euo pipefail
          Scripts/analyze-bridge.zsh

      - name: Run bridge tests
        shell: zsh {0}
        run: |
          set -euo pipefail
          SKIP_BUILD_DEPS=1 Scripts/test-bridge.zsh
